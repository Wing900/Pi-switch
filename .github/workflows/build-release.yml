name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build for Windows
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
          wails build -platform windows/amd64 -o "PiSwitch-${{ github.ref_name }}-windows-amd64.exe"

      - name: Prepare release assets
        run: |
          mkdir release
          move "build\bin\PiSwitch-${{ github.ref_name }}-windows-amd64.exe" release\
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: release/

  build-macos:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build for macOS (${{ matrix.arch }})
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
          wails build -platform darwin/${{ matrix.arch }} -o "PiSwitch-${{ github.ref_name }}-macos-${{ matrix.arch }}"

      - name: Prepare release assets
        run: |
          mkdir -p release
          cd "build/bin"
          zip -r "../../release/PiSwitch-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip" "PiSwitch-${{ github.ref_name }}-macos-${{ matrix.arch }}.app"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: release/

  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p publish
          find artifacts -type f \( -name "*.exe" -o -name "*.zip" \) -exec cp {} publish/ \;
          echo "=== Release assets ==="
          ls -la publish/

      - uses: softprops/action-gh-release@v2
        with:
          files: publish/*
